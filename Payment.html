<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />s
  <title>Document</title>
  <style>
    html{
      background-color: rgb(22, 22, 22);
    }
    .nav img{
      width: 80px;
      margin: 10px 15px;
    }
    .nav #icon {
      color: white;
      margin: 10px 18px;
      text-decoration: none;
      border: 2px solid skyblue;
      border-radius: 30px;
      background-color: rgb(12, 12, 108);
      padding: 5px 5px;
      height: 20px;
    }
    .nav{
      display: flex;
      justify-content: space-between;
    }
    .payments-parent{
      display: flex;
    }
    .payment1{
      border: 1px solid rgb(157, 156, 156);
      box-shadow: 0px 0px 5px gray;
      border-radius: 10px;
      width: 500px;
      height: 400px;
      margin: 30px 10px 0px 200px;
      padding: 0px 20px;
    }
    .payment2{
      border: 1px solid rgb(157, 156, 156);
      box-shadow: 0px 0px 5px gray;
      border-radius: 10px;
      width: 550px;
      height: 600px;
      margin: 30px 50px;
    }
    .payments-parent .payment1 .payment1-head{
      display: flex;
      justify-content: space-between;
    }
    #fonts{
      color: white;
      font-family: Arial, Helvetica, sans-serif;
    }
    a{
      text-decoration: none;
    }
    /* .plan-bar{
      border: 1px solid white;
      background-color: rgb(65, 64, 64);
      width: 98%;
      height: 50px;
      border-radius: 10px;
    } */
    .plan-bar select{
      margin: auto;
      padding: 13.5px 30px;
      width: 490px;
      background-color: gray;
      margin-bottom: 20px;
      box-shadow: 0px 0px 8px gray;
    }
    .plan-bar option{
      font-size: 15px;
    }
    .input input{
      width: 400px;
      height: 40px;
      background-color: black;
      border-radius: 10px;
      padding: 0px 10px;
      border: 1px solid grey;
      color: aliceblue;
    }
    .input button{
      width: 65px;
      height: 40px;
      background-color: chocolate;
      border: none;
      border-radius: 10px;
      color: aliceblue;
      font-size: 15px;
      font-weight: bold;
      box-shadow: 0px 0px 8px sandybrown;
    }
    .charges{
      display: flex;
      justify-content: space-between;
      margin: auto;
    }
    .charges h2{
      padding-top: 20px;
      margin: auto;
    }
    p{
      color: grey;
      font-family: Arial, Helvetica, sans-serif;
    }
  </style>
</head>
<body>
  <div>
    <div class="nav">
      <img src="./Assests/Aha-logo.png" alt="">
      <a id="icon" href="index.html"><i class="fa-solid fa-circle-user"></i>Profile</a>
    </div>
    <div class="payments-parent">
      <div class="payment1">
        <div class="payment1-head">
          <h1 id="fonts">Selected plan</h1>
          <a href="Subscription.html"><h4 id="fonts">Change Plan ></h4></a>
        </div>
        <div class="plan-bar">
          <!-- <h3 id="fonts">Annual</h3> -->
          <select>
            <option value="">Annual</option>
            <option value="">Quaterly</option>
            <option value="">Monthly</option>
          </select>
        </div>
        <div class="input">
          <input type="text" placeholder="Enter Coupon / Offer code">
          <button>Apply</button>
        </div>
        <div class="charges">
          <h2 id="fonts">Plan Charges</h2>
          <h2 id="fonts"></i>499/-</h2>
        </div>
        <hr>
        <div class="charges">
          <h2 id="fonts">You Pay</h2>
          <h2 id="fonts">499/-</h2>
        </div>
        <hr>
        <p>Your plan auto renews until you cancel. By proceeding, I confirm that I am over 18 year, and agree to the Terms of use and Privacy Policy</p>
      </div>
      <div class="payment2">
        
      </div>
    </div>
  </div>
</body>
</html>
